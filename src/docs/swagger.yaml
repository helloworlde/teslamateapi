info:
  contact: {}
  description: 基于 TeslaMate 数据库的 REST API，提供车辆、充电、行程、统计、图表、时间线和洞察数据。原 TeslaMateApi
    兼容接口保持响应结构；扩展接口按当前项目最佳实践重新设计，可能包含破坏性变更。日期参数支持 RFC3339、带时区偏移、本地日期时间和纯日期；未带时区的本地日期使用环境变量配置的时区。
  title: TeslaMateApi
  version: "1.0"
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.APISystemMessageResponse'
      summary: API 根路径
      tags:
      - System
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.APISystemMessageResponse'
      summary: Health check
      tags:
      - System
  /ping:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.APISystemMessageResponse'
      summary: 连通性检查
      tags:
      - System
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.APISystemMessageResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/main.APISystemErrorBody'
      summary: Readiness check
      tags:
      - System
  /v1:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.APISystemMessageResponse'
      summary: API v1 根路径
      tags:
      - System
  /v1/cars:
    get:
      description: 兼容接口：返回全部车辆。历史兼容原因下，部分数据库空值仍可能表现为空字符串或 0；部分旧错误仍可能以 HTTP 200 返回只包含
        error 字段的 JSON。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CarsV1Envelope'
      summary: 查询车辆列表
      tags:
      - Compatible API
  /v1/cars/{CarID}:
    get:
      description: 兼容接口：返回匹配车辆，结果位于 data.cars 中，通常只有一条。历史兼容原因下，部分旧错误仍可能以 HTTP 200
        返回只包含 error 字段的 JSON。
      parameters:
      - default: 1
        description: 车辆 ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CarsV1Envelope'
      summary: 查询单车信息
      tags:
      - Compatible API
  /v1/cars/{CarID}/battery-health:
    get:
      description: 兼容接口：保留原 battery-health 响应结构。需要图表友好数据时，建议使用 `/v1/cars/{CarID}/series/battery?metrics=range,soc`。
      parameters:
      - default: 1
        description: 车辆 ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.BatteryHealthV1Envelope'
      summary: 电池健康
      tags:
      - Compatible API
  /v1/cars/{CarID}/calendar:
    get:
      description: 扩展接口：按 day/week/month 聚合行程和充电数据，返回总体 summary 和倒序 bucket 列表。
      parameters:
      - default: 1
        description: 车辆 ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: 范围开始时间
        in: query
        name: startDate
        type: string
      - description: 范围结束时间
        in: query
        name: endDate
        type: string
      - description: 聚合粒度：day|week|month
        in: query
        name: bucket
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CalendarV2Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: 日历聚合
      tags:
      - Extended API
  /v1/cars/{CarID}/charges:
    get:
      description: 列表项含每条充电会话首条采样行的 conn_charge_cable（接口/线缆类型）与 fast_charger_brand（直流快充品牌，可选）。
      parameters:
      - default: 1
