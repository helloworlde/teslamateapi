basePath: /api
definitions:
  main.SwaggerDataResponse:
    properties:
      data:
        additionalProperties: true
        type: object
    type: object
  main.SwaggerErrorResponse:
    properties:
      error:
        example: Unable to load summary.
        type: string
    type: object
  main.SwaggerMessageResponse:
    properties:
      message:
        example: pong
        type: string
      path:
        example: /api/v1
        type: string
    type: object
  main.v1Error:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  main.v1ErrorEnvelope:
    properties:
      error:
        $ref: '#/definitions/main.v1Error'
    type: object
  main.v1ListEnvelope:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/main.v1Meta'
      pagination:
        $ref: '#/definitions/main.v1Pagination'
      warnings:
        items: {}
        type: array
    type: object
  main.v1Meta:
    properties:
      car_id:
        type: integer
      generated_at:
        type: string
      timezone:
        type: string
      unit:
        type: string
      version:
        type: string
    type: object
  main.v1ObjectEnvelope:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/main.v1Meta'
      warnings:
        items: {}
        type: array
    type: object
  main.v1Pagination:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
  description: RESTful API for TeslaMate-backed vehicle, charge, drive, statistics,
    chart, timeline, and insight data. Original TeslaMateApi routes remain compatible;
    redesigned extension routes may introduce breaking changes. Date query parameters
    support RFC3339, timezone offsets, decoded-space offsets, local datetime, and
    date-only formats. When using `+08:00` in URLs, prefer `%2B08:00`, though decoded-space
    offsets are also accepted.
  title: TeslaMateApi
  version: "1.0"
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerMessageResponse'
      summary: API root
      tags:
      - System
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerMessageResponse'
      summary: Health check
      tags:
      - System
  /ping:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerMessageResponse'
      summary: Ping
      tags:
      - System
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerMessageResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Readiness check
      tags:
      - System
  /v1:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerMessageResponse'
      summary: API v1 root
      tags:
      - System
  /v1/cars:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: List cars
      tags:
      - Compatible API
  /v1/cars/{CarID}:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Get car
      tags:
      - Compatible API
  /v1/cars/{CarID}/battery-health:
    get:
      description: Original compatible battery-health endpoint. Use `/v1/cars/{CarID}/charts/battery/health`
        for chart-friendly series.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Battery health
      tags:
      - Compatible API
  /v1/cars/{CarID}/calendar:
    get:
      description: Unified calendar endpoint for drives/charges metrics. Supports
        day, week, month buckets and returns summary + item list.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: range start
        in: query
        name: startDate
        required: true
        type: string
      - description: range end
        in: query
        name: endDate
        required: true
        type: string
      - description: day|week|month
        in: query
        name: bucket
        type: string
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Calendar
      tags:
      - Extended API
  /v1/cars/{CarID}/charges:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Supports RFC3339, offset values, decoded-space offsets, local
          datetime, and date-only values
        in: query
        name: startDate
        type: string
      - description: Supports RFC3339, offset values, decoded-space offsets, local
          datetime, and date-only values
        in: query
        name: endDate
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: show
        type: integer
      - description: Page size alias
        in: query
        name: limit
        type: integer
      - description: Offset alias
        in: query
        name: offset
        type: integer
      - description: start_date|-start_date|duration|-duration|cost|-cost|energy|-energy
        in: query
        name: sort
        type: string
      - description: summary,location,energy,cost
        in: query
        name: include
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: List charges
      tags:
      - Compatible API
  /v1/cars/{CarID}/charges/{ChargeID}:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Charge ID
        in: path
        name: ChargeID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Charge details
      tags:
      - Compatible API
  /v1/cars/{CarID}/charges/current:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Current charge
      tags:
      - Compatible API
  /v1/cars/{CarID}/command:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: List command options
      tags:
      - Compatible API
  /v1/cars/{CarID}/command/{Command}:
    post:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Command name
        in: path
        name: Command
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Execute command
      tags:
      - Compatible API
  /v1/cars/{CarID}/dashboard:
    get:
      description: Aggregated dashboard payload for app home. Returns statistics,
        calendar summary, optional series/distribution placeholders, and warnings
        in one request.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: year|month|week|custom
        in: query
        name: period
        type: string
      - description: YYYY-MM-DD or RFC3339
        in: query
        name: date
        type: string
      - description: custom range start
        in: query
        name: startDate
        type: string
      - description: custom range end
        in: query
        name: endDate
        type: string
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Dashboard
      tags:
      - Extended API
  /v1/cars/{CarID}/distributions:
    get:
      description: Distribution buckets for drive and charge behavior. Supports hour,
        duration, distance, speed, energy and power distributions.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: 'comma separated metrics: drive_start_hour,drive_duration,drive_distance,drive_speed,charge_start_hour,charge_duration,charge_energy,charge_power'
        in: query
        name: metrics
        type: string
      - description: range start
        in: query
        name: startDate
        required: true
        type: string
      - description: range end
        in: query
        name: endDate
        required: true
        type: string
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Distributions
      tags:
      - Extended API
  /v1/cars/{CarID}/drives:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Supports RFC3339, offset values, decoded-space offsets, local
          datetime, and date-only values
        in: query
        name: startDate
        type: string
      - description: Supports RFC3339, offset values, decoded-space offsets, local
          datetime, and date-only values
        in: query
        name: endDate
        type: string
      - description: Minimum drive distance
        in: query
        name: minDistance
        type: number
      - description: Maximum drive distance
        in: query
        name: maxDistance
        type: number
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: show
        type: integer
      - description: Page size alias
        in: query
        name: limit
        type: integer
      - description: Offset alias
        in: query
        name: offset
        type: integer
      - description: start_date|-start_date|distance|-distance|duration|-duration|efficiency|-efficiency
        in: query
        name: sort
        type: string
      - description: summary,locations,energy
        in: query
        name: include
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: List drives
      tags:
      - Compatible API
  /v1/cars/{CarID}/drives/{DriveID}:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Drive ID
        in: path
        name: DriveID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Drive details
      tags:
      - Compatible API
  /v1/cars/{CarID}/insights:
    get:
      description: Baseline-comparison insights generated from current range versus
        previous equivalent range, including efficiency, cost, charging, battery and
        anomaly signals.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: range start
        in: query
        name: startDate
        required: true
        type: string
      - description: range end
        in: query
        name: endDate
        required: true
        type: string
      - description: 'comma separated types: efficiency,cost,charging,driving,battery,anomaly'
        in: query
        name: types
        type: string
      - description: insight count limit, 1-100, default 20
        in: query
        name: limit
        type: integer
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Insights
      tags:
      - Extended API
  /v1/cars/{CarID}/logging:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Get logging status
      tags:
      - Compatible API
  /v1/cars/{CarID}/logging/{Command}:
    put:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Logging command
        in: path
        name: Command
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Update logging status
      tags:
      - Compatible API
  /v1/cars/{CarID}/map/visited:
    get:
      description: Visited geo points and map bounds for heatmap/coverage rendering.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: range start
        in: query
        name: startDate
        required: true
        type: string
      - description: range end
        in: query
        name: endDate
        required: true
        type: string
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Visited map
      tags:
      - Extended API
  /v1/cars/{CarID}/series:
    get:
      description: Unified time series endpoint with scope-aware metrics and chart
        metadata. Unsupported metric/scope pairs are skipped with warnings.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: drives|charges|battery|states|overview
        in: query
        name: scope
        type: string
      - description: 'comma separated metrics: distance,efficiency,speed,energy,cost,power,soc,range,regeneration,vampire_drain'
        in: query
        name: metrics
        type: string
      - description: raw|hour|day|week|month|year
        in: query
        name: bucket
        type: string
      - description: range start
        in: query
        name: startDate
        required: true
        type: string
      - description: range end
        in: query
        name: endDate
        required: true
        type: string
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Series
      tags:
      - Extended API
  /v1/cars/{CarID}/statistics:
    get:
      description: Unified period statistics with explicit overview/drive/charge/battery
        sections, including efficiency, cost, energy and parking metrics.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: year|month|week|custom
        in: query
        name: period
        type: string
      - description: YYYY-MM-DD or RFC3339
        in: query
        name: date
        type: string
      - description: custom range start
        in: query
        name: startDate
        type: string
      - description: custom range end
        in: query
        name: endDate
        type: string
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ObjectEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Statistics
      tags:
      - Extended API
  /v1/cars/{CarID}/status:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Current vehicle status
      tags:
      - Compatible API
  /v1/cars/{CarID}/timeline:
    get:
      description: Unified timeline feed for drive/charge/state activities with pagination.
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: range start
        in: query
        name: startDate
        required: true
        type: string
      - description: range end
        in: query
        name: endDate
        required: true
        type: string
      - description: page size
        in: query
        name: limit
        type: integer
      - description: offset
        in: query
        name: offset
        type: integer
      - description: IANA timezone
        in: query
        name: timezone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.v1ListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.v1ErrorEnvelope'
      summary: Timeline
      tags:
      - Extended API
  /v1/cars/{CarID}/updates:
    get:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: show
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: List updates
      tags:
      - Compatible API
  /v1/cars/{CarID}/wake_up:
    post:
      parameters:
      - default: 1
        description: Car ID
        in: path
        name: CarID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Wake up vehicle
      tags:
      - Compatible API
  /v1/globalsettings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SwaggerErrorResponse'
      summary: Global settings
      tags:
      - Compatible API
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
