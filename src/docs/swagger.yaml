basePath: /api
definitions:
  main.APIChartPoint:
    properties:
      label:
        type: string
      time:
        type: string
      value:
        type: number
    type: object
  main.APIChartResponse:
    properties:
      bucket:
        type: string
      car_id:
        type: integer
      meta:
        additionalProperties: {}
        type: object
      range:
        $ref: '#/definitions/main.APIRange'
      series:
        items:
          $ref: '#/definitions/main.APIChartSeries'
        type: array
      timezone:
        type: string
    type: object
  main.APIChartSeries:
    properties:
      name:
        type: string
      points:
        items:
          $ref: '#/definitions/main.APIChartPoint'
        type: array
      unit:
        type: string
    type: object
  main.APIErrorDetail:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  main.APIErrorResponse:
    properties:
      error:
        $ref: '#/definitions/main.APIErrorDetail'
    type: object
  main.APIListResponse:
    properties:
      car_id:
        type: integer
      data:
        items: {}
        type: array
      meta:
        additionalProperties: {}
        type: object
      pagination:
        $ref: '#/definitions/main.APIPagination'
      range:
        $ref: '#/definitions/main.APIRange'
      timezone:
        type: string
    type: object
  main.APIObjectResponse:
    properties:
      car_id:
        type: integer
      data:
        additionalProperties: {}
        type: object
      meta:
        additionalProperties: {}
        type: object
      range:
        $ref: '#/definitions/main.APIRange'
      timezone:
        type: string
      unit:
        $ref: '#/definitions/main.APIUnits'
    type: object
  main.APIPagination:
    properties:
      page:
        type: integer
      show:
        type: integer
      total:
        type: integer
    type: object
  main.APIRange:
    properties:
      end:
        type: string
      start:
        type: string
    type: object
  main.APIUnits:
    properties:
      consumption:
        type: string
      currency:
        type: string
      distance:
        type: string
      duration:
        type: string
      energy:
        type: string
      percentage:
        type: string
      speed:
        type: string
      temperature:
        type: string
    type: object
  main.SwaggerDataResponse:
    properties:
      data:
        additionalProperties: true
        type: object
    type: object
  main.SwaggerErrorResponse:
    properties:
      error:
        example: Unable to load summary.
        type: string
    type: object
  main.SwaggerMessageResponse:
    properties:
      message:
        example: pong
        type: string
      path:
        example: /api/v1
        type: string
    type: object
info:
  contact: {}
  description: RESTful API for TeslaMate-backed vehicle, charge, drive, statistics,
    chart, timeline, and insight data. Original TeslaMateApi routes remain compatible;
    redesigned extension routes may introduce breaking changes. Date query parameters
    support RFC3339, timezone offsets, decoded-space offsets, local datetime, and
    date-only formats. When using `+08:00` in URLs, prefer `%2B08:00`, though decoded-space
    offsets are also accepted.
  title: TeslaMateApi
  version: "1.0"
