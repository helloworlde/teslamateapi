name: publish ghcr

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
    paths:
      - ".github/workflows/ghcr.yml"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: prepare metadata
    runs-on: ubuntu-24.04

    outputs:
      image_name: ${{ steps.image.outputs.name }}
      docker_meta_json: ${{ steps.docker_meta.outputs.json }}
      docker_meta_labels: ${{ steps.docker_meta.outputs.labels }}

    steps:
      - name: Image name (lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch

  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: x86_64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: aarch64
          - runner: ubuntu-24.04-arm
            platform: linux/arm/v7
            arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU (${{ matrix.platform }})
        if: matrix.platform == 'linux/arm/v7'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        id: docker_build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ needs.prepare.outputs.image_name }}
          labels: ${{ needs.prepare.outputs.docker_meta_labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=ghcr-${{ matrix.platform }}
          cache-to: type=gha,scope=ghcr-${{ matrix.platform }},mode=max
          build-args: |
            apiVersion=${{ fromJSON(needs.prepare.outputs.docker_meta_json).labels['org.opencontainers.image.version'] }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.docker_build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: manifest (multi-arch)
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - build

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ needs.prepare.outputs.image_name }}
          DOCKER_META_JSON: ${{ needs.prepare.outputs.docker_meta_json }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_META_JSON") \
            $(printf '%s@sha256:%s ' "$IMAGE" *)
